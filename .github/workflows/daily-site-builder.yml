name: Daily Website Builder & Blog Generator

on:
  workflow_dispatch:

  push:
    branches:
      - main

  schedule:
    # Runs every day at 8:00 AM UTC
    - cron: "0 8 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: tellent-site-builder
  cancel-in-progress: false

jobs:

  build-site:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync Latest Remote
        shell: bash
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Verify Files
        run: |
          ls -la
          python --version

      - name: Install Python Dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "No requirements.txt found"
          fi

      - name: Build Website
        shell: bash
        run: |
          if [ -f build.py ]; then
            python build.py
          else
            echo "ERROR: build.py missing"
            exit 1
          fi

      - name: Verify Dist Output
        shell: bash
        run: |
          echo "DIST CONTENTS"
          ls -R dist

          if [ ! -d dist ]; then
            echo "ERROR: dist folder missing"
            exit 1
          fi

      - name: Detect Changes
        id: changes
        shell: bash
        run: |
          git add .

          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes detected."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit Site Updates
        if: steps.changes.outputs.changed == 'true'
        shell: bash
        run: |
          git commit -m "Daily site rebuild and blog generation"

      - name: Safe Push Retry Loop
        if: steps.changes.outputs.changed == 'true'
        shell: bash
        run: |
          for i in 1 2 3 4 5
          do
            echo "Push attempt $i"

            git fetch origin main

            git pull --rebase origin main || {
              echo "Rebase failed. Cleaning state..."
              git rebase --abort || true
              sleep 5
              continue
            }

            if git push origin HEAD:main; then
              echo "Push successful."
              exit 0
            fi

            echo "Push rejected. Retrying..."
            sleep 5
          done

          echo "Failed to push after multiple retries."
          exit 1

      - name: Upload GitHub Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:

    needs: build-site

    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:

      - name: Deploy To GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
