name: Daily Website Builder & Blog Generator

on:
  workflow_dispatch:

  schedule:
    - cron: "0 8 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: tellent-site-builder
  cancel-in-progress: true

jobs:

  build-site:

    runs-on: ubuntu-latest

    steps:

      # Checkout repository
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      # Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Configure Git
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # Force sync latest remote state
      - name: Sync Latest Remote
        shell: bash
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      # Verify files
      - name: Verify Files
        run: |
          ls -la
          python --version

      # Install dependencies
      - name: Install Python Dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      # Build site
      - name: Build Website
        shell: bash
        run: |
          if [ ! -f build.py ]; then
            echo "ERROR: build.py missing"
            exit 1
          fi

          python build.py

      # Verify output
      - name: Verify Dist Output
        shell: bash
        run: |
          if [ ! -d dist ]; then
            echo "ERROR: dist folder missing"
            exit 1
          fi

          echo "DIST CONTENTS"
          ls -R dist

      # Detect changes
      - name: Detect Changes
        id: changes
        shell: bash
        run: |
          git add .

          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes detected."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      # Commit
      - name: Commit Site Updates
        if: steps.changes.outputs.changed == 'true'
        shell: bash
        run: |
          git commit -m "Daily site rebuild and blog generation [skip ci]"

      # Safe push
      - name: Safe Push Retry Loop
        if: steps.changes.outputs.changed == 'true'
        shell: bash
        run: |

          for i in 1 2 3 4 5
          do
            echo "Push attempt $i"

            git fetch origin main

            git rebase origin/main || {
              echo "Rebase failed"

              git rebase --abort || true

              git reset --hard origin/main

              exit 1
            }

            if git push origin HEAD:main; then
              echo "Push successful"
              exit 0
            fi

            echo "Push rejected. Retrying..."
            sleep 10
          done

          echo "Failed after multiple retries"
          exit 1

      # Upload Pages artifact
      - name: Upload GitHub Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:

    needs: build-site

    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:

      - name: Deploy To GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
