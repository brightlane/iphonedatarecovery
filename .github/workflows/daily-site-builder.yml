name: Daily Website Builder & Blog Generator

on:
  workflow_dispatch:

  push:
    branches:
      - main

  schedule:
    # Runs every day at 8:00 AM UTC
    - cron: "0 8 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:

  build-site:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify Files
        run: |
          ls
          python --version

      - name: Build Website
        run: python build.py

      - name: Verify Dist Output
        run: |
          echo "DIST CONTENTS"
          ls -R dist

      - name: Commit Fresh Blog + Site Updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .

          git diff --staged --quiet || git commit -m "Daily site rebuild and blog generation"

          git push

      - name: Upload GitHub Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:

    needs: build-site

    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:

      - name: Deploy To GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
